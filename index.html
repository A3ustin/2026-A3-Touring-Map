<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Merchandise — Tour Map 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
/* ── RESET & TOKENS ─────────────────────────────────────── */
:root{
  --bg:     #0a0e14;
  --surface:#0f1419;
  --card:   #161c24;
  --border: #1e2832;
  --text:   #f0f4f8;
  --muted:  #4a5a6a;
  --mid:    #7a8a9a;
  --a3-blue:  #1a6bcc;
  --a3-blue2: #2d8fff;
  --a3-red:   #cc2200;
  --a3-red2:  #ff3311;
  --a3-white: #f0f4f8;
  --accent:   #1a6bcc;
  --gold:     #1a6bcc;
  --gold2:    #2d8fff;
  --red:      #cc2200;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:13px;}

/* ── HEADER ─────────────────────────────────────────────── */
#header{
  background:var(--surface);
  border-bottom:2px solid var(--a3-blue);
  padding:0 20px;
  display:flex;align-items:center;gap:20px;
  height:52px;flex-shrink:0;z-index:200;position:relative;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:3px;
  color:var(--a3-blue2);
  line-height:1;flex-shrink:0;
}
.logo span{color:var(--a3-red2);}
.tagline{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);flex-shrink:0;
  border-left:1px solid var(--border);
  padding-left:16px;line-height:1.7;
}
.tagline strong { color: var(--mid); }
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.meta-pill{
  background:var(--card);border:1px solid var(--border);
  padding:4px 12px;border-radius:2px;
  font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
  text-align:center;
}
.meta-pill strong{color:var(--a3-blue2);font-size:16px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;display:block;}
.meta-pill .label{font-size:8px;letter-spacing:1.5px;}
.perhead-pill strong { color: var(--a3-red2); }

/* ── FILTER STRIP ───────────────────────────────────────── */
#filter-strip{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:8px 20px;
  display:flex;flex-direction:column;gap:6px;
  flex-shrink:0;
}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.filter-label{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);width:54px;flex-shrink:0;
}

/* Rep buttons */
.rep-btn{
  padding:3px 12px;border-radius:2px;
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.5px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--muted);
  transition:all .15s;white-space:nowrap;
}
.rep-btn:hover{color:var(--text);border-color:var(--mid);}
.rep-btn.active{color:#fff;border-color:transparent;}
.rep-btn[data-rep="ALL"].active{background:var(--a3-blue);color:#fff;}
.rep-btn[data-rep="Hueston"].active{background:#0d7a4e;color:#fff;}
.rep-btn[data-rep="Nathan"].active{background:#1a6bcc;color:#fff;}
.rep-btn[data-rep="Jonathan"].active{background:#7a1acc;color:#fff;}
.rep-btn[data-rep="Danny"].active{background:var(--a3-red);color:#fff;}

/* Artist buttons — multi-select: active = filled with artist color */
.fbtn{
  padding:3px 10px;border-radius:2px;
  font-size:10px;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--muted);
  transition:all .15s;white-space:nowrap;
}
.fbtn:hover{color:var(--text);}
.fbtn.active{color:#000!important;border-color:transparent!important;}
.fbtn[data-a="ALL"].active{color:#fff!important;}

/* Date filter */
.date-inputs{display:flex;align-items:center;gap:8px;}
.date-inputs input[type="date"]{
  background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:3px 8px;border-radius:2px;
  font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;
}
.date-inputs input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6);}
.date-clear{
  padding:3px 8px;background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:10px;cursor:pointer;border-radius:2px;
  transition:all .15s;
}
.date-clear:hover{color:var(--text);border-color:var(--mid);}

/* Past/Future toggle */
.toggle-btn{
  padding:3px 10px;border-radius:2px;
  font-size:10px;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--muted);
  transition:all .15s;white-space:nowrap;
}
.toggle-btn.active{background:var(--a3-blue);color:#fff;border-color:transparent;}
.toggle-btn.active-red{background:var(--a3-red);color:#fff;border-color:transparent;}

/* ── LAYOUT ─────────────────────────────────────────────── */
#layout{display:flex;}

/* ── MAP ─────────────────────────────────────────────────── */
#map-panel{
  flex:1;position:relative;overflow:hidden;background:#0d1e2e;
}
#map-panel svg{width:100%;height:100%;cursor:grab;}
#map-panel svg:active{cursor:grabbing;}
.sphere{fill:#0d1e2e;}
.graticule{fill:none;stroke:#162840;stroke-width:.4;}
.land{fill:#1e3448;stroke:#2d4f6a;stroke-width:.6;}
.borders{fill:none;stroke:#2a4560;stroke-width:.35;}
.show-dot{cursor:pointer;}

/* Past show dots - slightly muted */
.show-dot.past-dot{opacity:0.72;}

#map-watermark{
  position:absolute;bottom:12px;right:16px;
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:4px;color:rgba(26,107,204,0.07);
  pointer-events:none;user-select:none;
}
#zoom-btns{
  position:absolute;bottom:12px;left:14px;
  display:flex;flex-direction:column;gap:3px;z-index:10;
}
.zbtn{
  width:30px;height:30px;background:var(--surface);
  border:1px solid var(--border);color:var(--mid);
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:2px;transition:all .15s;
}
.zbtn:hover{background:var(--card);color:var(--a3-blue2);}

/* ── TOOLTIP ─────────────────────────────────────────────── */
#tip{
  position:fixed;
  background:var(--surface);
  border:1px solid var(--a3-blue);
  border-left:3px solid var(--a3-blue);
  padding:10px 14px;
  font-family:'DM Sans',sans-serif;font-size:11px;
  pointer-events:none;z-index:9999;display:none;
  line-height:1.8;max-width:260px;
  box-shadow:0 8px 32px rgba(0,0,0,.9);
}
#tip .tip-artist{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;}
#tip .tip-venue{color:var(--text);}
#tip .tip-city{color:var(--muted);font-size:10px;}
#tip .tip-date{font-size:10px;color:var(--a3-blue2);margin-top:2px;}
#tip .tip-rep{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
#tip .tip-perhead{font-size:11px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
#tip .tip-perhead strong{color:var(--a3-red2);font-size:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
#tip .tip-attend{font-size:10px;color:var(--muted);}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar{
  width:320px;flex-shrink:0;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#sidebar-head{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
#sidebar-head span{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
#count{color:var(--a3-blue2);}
#list{overflow-y:auto;flex:1;}
#list::-webkit-scrollbar{width:3px;}
#list::-webkit-scrollbar-thumb{background:var(--border);}

.month-head{
  padding:6px 16px;
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;
  color:var(--muted);
  position:sticky;top:0;background:var(--surface);z-index:5;
  border-bottom:1px solid var(--border);
}
.show-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 16px;border-bottom:1px solid #0c1018;
  cursor:pointer;transition:background .1s;
}
.show-row:hover{background:rgba(26,107,204,0.06);}
.show-row.highlighted{background:rgba(26,107,204,0.14)!important;border-left:2px solid var(--a3-blue);padding-left:14px;}
.show-row.past-row{opacity:0.78;}
.show-row.past-row .row-date .d{color:var(--mid);}
.dot-sq{width:7px;height:7px;border-radius:1px;flex-shrink:0;}
.row-info{flex:1;min-width:0;}
.row-artist{font-size:11px;font-weight:600;line-height:1.3;}
.row-venue{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-meta{font-size:9px;color:#2a3a4a;display:flex;gap:8px;align-items:center;}
.row-rep{color:#333;}
.row-perhead{
  font-size:9px;color:var(--a3-red);font-weight:600;
  background:rgba(204,34,0,0.08);padding:1px 5px;border-radius:2px;
  white-space:nowrap;
}
.row-date{font-size:9px;color:var(--muted);text-align:right;flex-shrink:0;}
.row-date .d{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);display:block;line-height:1;}

/* ── INFOGRAPHIC PANEL ──────────────────────────────────── */
#info-panel{
  position:fixed;inset:0;background:rgba(5,10,15,0.92);z-index:500;
  display:none;align-items:center;justify-content:center;
}
#info-panel.open{display:flex;}
#info-inner{
  background:var(--surface);border:1px solid var(--a3-blue);
  width:820px;max-width:95vw;max-height:90vh;
  border-radius:3px;overflow:hidden;display:flex;flex-direction:column;
}
#info-header{
  padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--card);flex-shrink:0;
}
#info-header h2{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  color:var(--a3-blue2);
}
#info-close{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:4px 10px;cursor:pointer;font-size:12px;border-radius:2px;
  transition:all .15s;
}
#info-close:hover{color:var(--text);border-color:var(--mid);}
#info-body{overflow-y:auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.info-section h3{
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;
  color:var(--mid);margin-bottom:12px;text-transform:uppercase;
}
.bar-row{
  display:flex;align-items:center;gap:8px;margin-bottom:7px;
}
.bar-label{font-size:10px;color:var(--text);width:160px;flex-shrink:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;background:var(--card);border-radius:1px;height:14px;position:relative;}
.bar-fill{height:100%;border-radius:1px;transition:width .4s ease;}
.bar-count{
  font-family:'Bebas Neue',sans-serif;font-size:12px;
  color:var(--a3-blue2);width:24px;text-align:right;flex-shrink:0;
}
/* Stats button */
#stats-btn{
  padding:3px 12px;border-radius:2px;
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.5px;cursor:pointer;
  border:1px solid var(--a3-blue);background:transparent;color:var(--a3-blue2);
  transition:all .15s;white-space:nowrap;
}
#stats-btn:hover{background:var(--a3-blue);color:#fff;}
</style>
</head>

</div>

<div id="filter-strip">

  </div>

    <div class="filter-label">Artist</div>
    <div id="filters" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
  </div>

      <button class="date-clear" id="date-clear">✕ Clear</button>
    </div>
    <div style="margin-left:12px;display:flex;gap:5px;">

  </div>
</div>

<!-- MAIN -->
<div id="layout">
  <div id="map-panel">
    <svg id="svg"></svg>
    <div id="zoom-btns">
      <button class="zbtn" id="zin">+</button>
      <button class="zbtn" id="zout">−</button>
      <button class="zbtn" id="zreset" title="Reset view" style="font-size:11px;">⌂</button>
    </div>
    <div id="map-watermark">A3 MERCHANDISE</div>
  </div>
  <div id="sidebar">
    <div id="sidebar-head">
      <span>Schedule</span>
      <span id="count">— shows</span>
    </div>
    <div id="list"></div>
  </div>
</div>

<div id="tip"></div>

<!-- INFOGRAPHIC PANEL -->
<div id="info-panel">
  <div id="info-inner">
    <div id="info-header">
      <h2>A3 — 2026 Tour Stats</h2>
      <button id="info-close">✕ Close</button>
    </div>
    <div id="info-body">
      <div class="info-section" id="venue-chart">
        <h3>Top 10 Venues by Visits</h3>
        <div id="venue-bars"></div>
      </div>
      <div class="info-section" id="state-chart">
        <h3>Top 10 States / Countries by Visits</h3>
        <div id="state-bars"></div>
      </div>
    </div>
  </div>
</div>

// COMBINE + SORT ALL SHOWS
// ═══════════════════════════════════════════════════════════════
const MO_NUM = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function showToDate(s){
  const [mo, dy] = s.date.split(' ');
  return new Date(2026, MO_NUM[mo], parseInt(dy));
}

// Mark future shows
FUTURE_SHOWS.forEach(s => { if(!s.past) s.past = false; });

const RAW = [...PAST_SHOWS, ...FUTURE_SHOWS];
RAW.sort((a,b) => showToDate(a)-showToDate(b));

// STATE
// ═══════════════════════════════════════════════════════════════
let activeArtists = new Set(['ALL']); // 'ALL' means no artist filter
let activeRep    = 'ALL';
let dateFrom     = null;
let dateTo       = null;
let showPast     = true;
let showFuture   = true;
let highlightedIdx = -1;

function passes(show){
  if(show.past && !showPast) return false;
  if(!show.past && !showFuture) return false;
  const repList = activeRep === 'ALL' ? null : REPS[activeRep];
  if(repList && !repList.includes(show.artist)) return false;
  // Multi-artist: ALL means no filter; otherwise show must match one of selected
  if(!activeArtists.has('ALL') && !activeArtists.has(show.artist)) return false;
  if(dateFrom || dateTo){
    const d = showToDate(show);
    if(dateFrom && d < dateFrom) return false;
    if(dateTo && d > dateTo) return false;
  }
  return true;
}

const fDiv = document.getElementById('filters');
const allArtistBtn = document.createElement('button');
allArtistBtn.className='fbtn active'; allArtistBtn.dataset.a='ALL';
allArtistBtn.textContent='All Artists';
allArtistBtn.style.cssText='background:#1a6bcc;color:#fff;';
fDiv.appendChild(allArtistBtn);

Object.entries(ARTISTS).forEach(([name,color])=>{
  const b=document.createElement('button');
  b.className='fbtn'; b.dataset.a=name; b.textContent=name;
  fDiv.appendChild(b);
});

function syncArtistButtons(){
  fDiv.querySelectorAll('.fbtn').forEach(b=>{
    const a = b.dataset.a;
    if(a === 'ALL'){
      const isAll = activeArtists.has('ALL');
      b.classList.toggle('active', isAll);
      b.style.background = isAll ? '#1a6bcc' : '';
      b.style.color = isAll ? '#fff' : '';
    } else {
      const on = activeArtists.has(a);
      b.classList.toggle('active', on);
      b.style.background = on ? (ARTISTS[a]||'#888') : '';
      b.style.color = on ? '#000' : '';
    }
  });
}

fDiv.addEventListener('click', e=>{
  const b = e.target.closest('.fbtn'); if(!b) return;
  const a = b.dataset.a;

  if(a === 'ALL'){
    // ALL clears any individual selection
    activeArtists = new Set(['ALL']);
  } else {
    // Toggle this artist; remove ALL token
    activeArtists.delete('ALL');
    if(activeArtists.has(a)){
      activeArtists.delete(a);
    } else {
      activeArtists.add(a);
    }
    // If nothing left selected, revert to ALL
    if(activeArtists.size === 0) activeArtists = new Set(['ALL']);
  }

  syncArtistButtons();
  refresh();
});

const svgEl   = d3.select('#svg');
const panel   = document.getElementById('map-panel');
let proj, pathFn, zoomBeh, gMap, gDots, currentT=d3.zoomIdentity;

function initMap(){
  const W=panel.clientWidth, H=panel.clientHeight;
  svgEl.selectAll('*').remove();
  proj = d3.geoNaturalEarth1().scale(W/6.3).translate([W/2,H/2]);
  pathFn = d3.geoPath().projection(proj);

  zoomBeh = d3.zoom().scaleExtent([0.4,20]).on('zoom', ev=>{
    currentT=ev.transform;
    gMap.attr('transform',ev.transform);
    gDots.attr('transform',ev.transform);
    const k=ev.transform.k;
    gDots.selectAll('.show-dot').each(function(_,i2,nodes){
      const el=nodes[i2]; const idx=+el.dataset.idx;
      const show=RAW[idx];
      const vis=passes(show);
      const isHi=idx===highlightedIdx;
      d3.select(this)
        .attr('r', vis ? (isHi?8:5)/k : 0)
        .attr('stroke-width', vis ? 0.8/k : 0);
    });
  });
  svgEl.call(zoomBeh);

  svgEl.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',pathFn);
  svgEl.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',pathFn);
  gMap  = svgEl.append('g');
  gDots = svgEl.append('g');

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
    gMap.selectAll('path')
      .data(topojson.feature(world,world.objects.countries).features)
      .join('path').attr('class','land').attr('d',pathFn);
    gMap.append('path')
      .datum(topojson.mesh(world,world.objects.countries,(a,b)=>a!==b))
      .attr('class','borders').attr('d',pathFn);
    renderDots();
  });

  document.getElementById('zin').onclick=()=>svgEl.transition().duration(300).call(zoomBeh.scaleBy,2);
  document.getElementById('zout').onclick=()=>svgEl.transition().duration(300).call(zoomBeh.scaleBy,0.5);
  document.getElementById('zreset').onclick=()=>svgEl.transition().duration(400).call(zoomBeh.transform,d3.zoomIdentity);
}

const tip=document.getElementById('tip');
let hoveredIdx = -1; // track what dot is currently enlarged from hover

function renderDots(){
  gDots.selectAll('.show-dot').remove();
  const k=currentT.k||1;
  hoveredIdx = -1;

  gDots.selectAll('.show-dot').data(RAW).join('circle')
    .attr('class', d => 'show-dot' + (d.past ? ' past-dot' : ''))
    .attr('data-idx',(_,i)=>i)
    .attr('r',(_,i)=> passes(RAW[i])?(i===highlightedIdx?8:5)/k:0)
    .attr('fill',d=>ARTISTS[d.artist]||'#888')
    .attr('fill-opacity', d => d.past ? 0.72 : 0.88)
    .attr('stroke',(d,i)=>i===highlightedIdx?'#fff':'rgba(0,0,0,0.5)')
    .attr('stroke-width',0.8/k)
    .attr('cx',d=>{const g=GEO[d.city];if(!g)return-9999;const p=proj([g[1],g[0]]);return p?p[0]:-9999;})
    .attr('cy',d=>{const g=GEO[d.city];if(!g)return-9999;const p=proj([g[1],g[0]]);return p?p[1]:-9999;})
    .style('pointer-events',(_,i)=>passes(RAW[i])?'all':'none')
    .on('mouseenter',function(ev,d){
      const idx = RAW.indexOf(d);
      hoveredIdx = idx;
      const c=ARTISTS[d.artist]||'#888';
      const rep=repOf(d.artist);
      const rc=REP_COLORS[rep]||'#888';
      let perHeadHtml = '';
      if(d.past && d.attend > 0 && d.gross != null){
        const ph = d.gross / d.attend;
        perHeadHtml = `<div class="tip-perhead">
          <strong>$${ph.toFixed(2)}</strong> per head
          <div class="tip-attend">${d.attend.toLocaleString()} attendees · $${Math.round(d.gross).toLocaleString()} gross</div>
        </div>`;
      }
      tip.innerHTML=
        `<div class="tip-artist" style="color:${c}">${d.artist}</div>`+
        `<div class="tip-venue">${d.venue}</div>`+
        `<div class="tip-city">${d.city}${d.state?' · '+d.state:''}</div>`+
        `<div class="tip-date">${d.date}, 2026${d.past?' · <span style="color:#cc2200">PAST</span>':''}</div>`+
        `<div class="tip-rep" style="color:${rc}">● ${rep}</div>`+
        perHeadHtml;
      tip.style.borderLeftColor = d.past ? '#cc2200' : '#1a6bcc';
      tip.style.display='block';
      // Only enlarge if not already highlighted
      if(idx !== highlightedIdx){
        const k2=currentT.k||1;
        d3.select(this).attr('r',8/k2).attr('fill-opacity',1).attr('stroke','#fff').attr('stroke-width',1.5/k2);
      }
    })
    .on('mousemove',ev=>{
      tip.style.left=(ev.clientX+14)+'px';
      tip.style.top=(ev.clientY-10)+'px';
    })
    .on('mouseleave',function(ev,d){
      const idx = RAW.indexOf(d);
      hoveredIdx = -1;
      tip.style.display='none';
      // Only reset if this wasn't the highlighted dot
      if(idx !== highlightedIdx){
        const k2=currentT.k||1;
        d3.select(this)
          .attr('r', passes(d) ? 5/k2 : 0)
          .attr('fill-opacity', d.past ? 0.72 : 0.88)
          .attr('stroke','rgba(0,0,0,0.5)')
          .attr('stroke-width', 0.8/k2);
      }
    });
  gDots.attr('transform',currentT);
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════
function buildSidebar(data){
  const list=document.getElementById('list');
  list.innerHTML='';
  let lastMo=null;

  data.forEach(([show,origIdx])=>{
    const mo=show.date.split(' ')[0];
    if(mo!==lastMo){
      const h=document.createElement('div');h.className='month-head';
      h.textContent=mo.toUpperCase()+' 2026';list.appendChild(h);lastMo=mo;
    }
    const[m,dy]=show.date.split(' ');
    const c=ARTISTS[show.artist]||'#888';
    const rep=repOf(show.artist);
    const rc=REP_COLORS[rep]||'#555';
    const row=document.createElement('div');
    row.className='show-row'+(origIdx===highlightedIdx?' highlighted':'')+(show.past?' past-row':'');
    row.dataset.idx=origIdx;

    let perHeadHtml='';
    if(show.past && show.attend > 0 && show.gross != null){
      const ph = show.gross / show.attend;
      perHeadHtml=`<span class="row-perhead">$${ph.toFixed(2)}/hd</span>`;
    }

    row.innerHTML=
      `<div class="dot-sq" style="background:${show.past?'#555':c}"></div>`+
      `<div class="row-info">`+
        `<div class="row-artist" style="color:${show.past?'#7a8a9a':c}">${show.artist}</div>`+
        `<div class="row-venue">${show.venue}</div>`+
        `<div class="row-meta">`+
          `<span class="row-rep" style="color:${rc}">● ${rep}</span>`+
          `<span style="color:#2a3a4a">${show.city}</span>`+
          perHeadHtml+
        `</div>`+
      `</div>`+
      `<div class="row-date"><span class="d">${dy}</span><span>${m}</span></div>`;
    row.addEventListener('click',()=>selectShow(origIdx));
    list.appendChild(row);
  });

  const visible=data.length;
  document.getElementById('count').textContent=visible+' shows';
  document.getElementById('cnt').textContent=visible;

  // Weighted avg per head: sum(gross) / sum(attend) — only past shows with actual attendance
  const pastWithData = data.filter(([s]) => s.past && s.attend > 0 && s.gross != null);
  if(pastWithData.length > 0){
    const totalGross  = pastWithData.reduce((sum,[s])=>sum + (s.gross||0), 0);
    const totalAttend = pastWithData.reduce((sum,[s])=>sum + s.attend, 0);
    const avgPH = totalAttend > 0 ? (totalGross/totalAttend) : 0;
    document.getElementById('ph-avg').textContent='$'+avgPH.toFixed(2);
  } else {
    document.getElementById('ph-avg').textContent='—';
  }
}

function selectShow(idx){
  highlightedIdx = idx===highlightedIdx ? -1 : idx;
  refresh();
  if(highlightedIdx>=0){
    const show=RAW[highlightedIdx];
    const g=GEO[show.city];
    if(g && proj){
      const p=proj([g[1],g[0]]);
      if(p){
        const W=panel.clientWidth, H=panel.clientHeight;
        const k=Math.max(currentT.k,3);
        const tx=W/2-k*p[0], ty=H/2-k*p[1];
        svgEl.transition().duration(600)
          .call(zoomBeh.transform, d3.zoomIdentity.translate(tx,ty).scale(k));
      }
    }
  }
}

function refresh(){
  const filtered=RAW.map((s,i)=>[s,i]).filter(([s])=>passes(s));
  buildSidebar(filtered);
  const k=currentT.k||1;
  gDots && gDots.selectAll('.show-dot').each(function(_,i2,nodes){
    const el=nodes[i2]; const idx=+el.dataset.idx;
    const show=RAW[idx];
    const vis=passes(show);
    const isHi=idx===highlightedIdx;
    const isHov=idx===hoveredIdx;
    d3.select(this)
      .attr('r', vis ? (isHi||isHov?8:5)/k : 0)
      .attr('stroke-width', vis ? (isHi||isHov?1.5:0.8)/k : 0)
      .attr('stroke', isHi||isHov ? '#fff' : 'rgba(0,0,0,0.5)')
      .attr('fill-opacity', isHi||isHov ? 1 : (show.past?0.72:0.88))
      .style('pointer-events', vis?'all':'none');
  });
}

function resolveLocation(show){
  // Past shows have a pre-computed locLabel
  if(show.locLabel) return show.locLabel;
  // Future shows — city lookup first (most reliable, state field is often empty)
  const city = show.city || '';
  if(CITY_COUNTRY[city]) return CITY_COUNTRY[city];
  if(CITY_STATE[city]) return CITY_STATE[city];
  // Fall back to state field
  const st = (show.state||'').trim();
  if(st && STATE_FULL[st]) return STATE_FULL[st];
  if(st && st.length > 2) return st;
  return null;
}

function buildCharts(){
  // Key venues by "Venue Name – City" (venue+city dedupe)
  const venueCounts = {};
  const locCounts   = {};

  RAW.forEach(s => {
    // Venue: use venueCity if present (past shows), else build it
    const vcKey = (s.venueCity || `${s.venue.trim()} – ${s.city.trim()}`).toLowerCase();
    const vcLabel = s.venueCity || `${s.venue.trim()} – ${s.city.trim()}`;
    if(!venueCounts[vcKey]) venueCounts[vcKey]={name:vcLabel, count:0};
    venueCounts[vcKey].count++;

    // Location
    const loc = resolveLocation(s);
    if(loc){
      if(!locCounts[loc]) locCounts[loc]={name:loc, count:0};
      locCounts[loc].count++;
    }
  });

  // Top 10 venues
  const topVenues = Object.values(venueCounts).sort((a,b)=>b.count-a.count).slice(0,10);
  const maxV = topVenues[0]?.count||1;
  const vBar = document.getElementById('venue-bars');
  vBar.innerHTML='';
  topVenues.forEach(v=>{
    const pct=(v.count/maxV)*100;
    vBar.innerHTML+=`
      <div class="bar-row">
        <div class="bar-label" title="${v.name}">${v.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--a3-blue);"></div></div>
        <div class="bar-count">${v.count}</div>
      </div>`;
  });

  // Top 15 states/countries (bumped up to show more variety)
  const topLocs = Object.values(locCounts).sort((a,b)=>b.count-a.count).slice(0,15);
  const maxS = topLocs[0]?.count||1;
  const sBar = document.getElementById('state-bars');
  sBar.innerHTML='';
  topLocs.forEach(s=>{
    const pct=(s.count/maxS)*100;
    sBar.innerHTML+=`
      <div class="bar-row">
        <div class="bar-label">${s.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--a3-red);"></div></div>
        <div class="bar-count">${s.count}</div>
      </div>`;
  });
}
